name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  APP_REPO: tinycld/tinycld
  APP_REF: main

jobs:
  checks:
    name: Lint, typecheck, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          path: sheets
      - uses: actions/checkout@v5
        with:
          repository: ${{ env.APP_REPO }}
          ref: ${{ env.APP_REF }}
          path: tinycld
      - uses: oven-sh/setup-bun@v2

      # The app shell bundles @tinycld/core at packages/@tinycld/core/. This
      # package's tsconfig path "@tinycld/core/*":
      # ["../tinycld/packages/@tinycld/core/*"] and its server go.mod replace
      # directive both point directly there.
      - name: Install app shell deps
        working-directory: tinycld
        run: bun install

      - name: Link sheets into tinycld app shell
        working-directory: tinycld
        run: bun run packages:link ../sheets

      - name: Expose tinycld's node_modules to sheets
        run: ln -s ../tinycld/node_modules sheets/node_modules

      - name: Lint sheets
        working-directory: sheets
        run: bun run lint

      # Typecheck runs from inside tinycld so module resolution sees the
      # full app-shell tree (uniwind augments, expo types, etc) — running
      # tsc standalone in the package directory misses those.
      - name: Typecheck (full app shell, package included via link)
        working-directory: tinycld
        env:
          NODE_OPTIONS: --preserve-symlinks
        run: bun run typecheck

      - name: Run unit tests
        working-directory: sheets
        run: bunx vitest run
