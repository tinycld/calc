name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  APP_REPO: tinycld/tinycld
  APP_REF: main
  # @tinycld/drive owns the comment_mentions migration that core's
  # notify hook + TS store reference. Without drive linked, the schema
  # regen below produces a pbSchema.ts missing comment_mentions and
  # core's typecheck fails on its own store registration.
  DRIVE_REPO: tinycld/drive
  DRIVE_REF: main

jobs:
  checks:
    name: Lint, typecheck, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          path: calc
      - uses: actions/checkout@v5
        with:
          repository: ${{ env.APP_REPO }}
          ref: ${{ env.APP_REF }}
          path: tinycld
      - uses: actions/checkout@v5
        with:
          repository: ${{ env.DRIVE_REPO }}
          ref: ${{ env.DRIVE_REF }}
          path: drive
      - uses: actions/setup-node@v5
        with:
          node-version-file: tinycld/.node-version
          cache: npm
          cache-dependency-path: tinycld/package-lock.json

      - name: Install tinycld deps (biome lives here)
        working-directory: tinycld
        run: npm ci

      - name: Link drive into tinycld app shell
        working-directory: tinycld
        run: npm run packages:link ../drive

      - name: Link calc into tinycld app shell
        working-directory: tinycld
        run: npm run packages:link ../calc

      - name: Lint (biome runs from tinycld; scans linked calc via app rules)
        working-directory: tinycld
        run: npm run lint

      # Typecheck runs from inside tinycld so module resolution sees the
      # full app-shell tree (uniwind augments, expo types, etc).
      - name: Typecheck (full app shell, package included via link)
        working-directory: tinycld
        env:
          NODE_OPTIONS: --preserve-symlinks
        run: npm run typecheck

      - name: Run unit tests (vitest picks up calc via packages glob)
        working-directory: tinycld
        run: npx vitest run packages/@tinycld/calc
